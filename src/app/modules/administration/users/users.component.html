<div>
  <div class="flex justify-between items-center mb-6 font-figtree">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">User Accounts</h1>
      <p class="text-slate-500 text-sm">
        Manage system users, assign access roles, and control active credentials.
      </p>
    </div>
    <div>
      <app-action-button
        label="Add New User"
        icon="add"
        [dialogComponent]="UserDialog"
        [dialogConfig]="matDialogConfig"
        (dialogClosed)="onDialogClosed($event)"
      ></app-action-button>
    </div>
  </div>

  <app-data-table
    [data]="users"
    [columns]="columns"
    [filters]="filters"
    [loading]="loading()"
    [isBackendSearch]="true"
    [totalItems]="totalItems"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [actionMenuItems]="actionMenuItems"
    (search)="onSearch($event)"
    (pageChange)="onPageChange($event)"
    (filterChange)="onFilterChange($event)"
    [columnTemplates]="{
      'is_active': statusTpl,
      'roles': rolesTpl
    }"
  >
  </app-data-table>

  <!-- Status Column Template -->
  <ng-template #statusTpl let-row>
    @if (row.is_active) {
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-800 border border-green-200">
        Active
      </span>
    } @else {
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-800 border border-gray-200">
        Inactive
      </span>
    }
  </ng-template>

  <!-- Roles Column Template -->
  <ng-template #rolesTpl let-row>
    <div class="flex flex-wrap gap-1">
      @if (row.roles && row.roles.length > 0) {
        @for (role of row.roles; track role.id) {
          <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-50 text-blue-700 border border-blue-100">
            {{ role.display_name }}
          </span>
        }
      } @else {
        <span class="text-slate-400 text-xs italic">No roles assigned</span>
      }
    </div>
  </ng-template>
</div>
