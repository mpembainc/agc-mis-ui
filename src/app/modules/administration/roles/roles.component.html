<div>
  <div class="flex justify-between items-center mb-6 font-figtree">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">User Roles & Permissions</h1>
      <p class="text-slate-500 text-sm">
        Manage role access levels, assign permissions to groups, and govern user capabilities.
      </p>
    </div>
    <div>
      <app-action-button
        label="Add New Role"
        icon="add"
        [dialogComponent]="RoleDialog"
        [dialogConfig]="matDialogConfig"
        (dialogClosed)="onDialogClosed($event)"
      ></app-action-button>
    </div>
  </div>

  <app-data-table
    [data]="roles"
    [columns]="columns"
    [loading]="loading()"
    [isBackendSearch]="true"
    [hidePagination]="true"
    [actionMenuItems]="actionMenuItems"
    (search)="onSearch($event)"
    [columnTemplates]="{
      'is_system': systemTpl,
      'permissions_count': permissionsCountTpl
    }"
  >
  </app-data-table>

  <!-- Type/IsSystem Column Template -->
  <ng-template #systemTpl let-row>
    @if (row.is_system) {
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-blue-100 text-blue-800 border border-blue-200">
        System
      </span>
    } @else {
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-purple-100 text-purple-800 border border-purple-200">
        Custom
      </span>
    }
  </ng-template>

  <!-- Permissions Count Column Template -->
  <ng-template #permissionsCountTpl let-row>
    <span class="inline-flex items-center justify-center px-2 py-1 rounded-md text-xs font-semibold bg-slate-100 text-slate-700 border border-slate-200">
      {{ row.permissions?.length || 0 }} Permissions
    </span>
  </ng-template>
</div>
