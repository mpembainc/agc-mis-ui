<div class="flex flex-col gap-6">
  <!-- Dashboard Welcome Header Block Component -->
  <app-dashboard-header></app-dashboard-header>

  <!-- Responsive Statistics Cards Grid Block -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
    @for (card of cards; track card.label) {
      <app-dashboard-card
        [label]="card.label"
        [count]="card.count"
        [icon]="card.icon"
        [theme]="card.theme"
        [linkText]="card.linkText">
      </app-dashboard-card>
    }
  </div>

  <!-- Responsive Dashboard Charts Grid Block -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <app-contracts-lifecycle-chart></app-contracts-lifecycle-chart>
    <app-contracts-type-chart></app-contracts-type-chart>
    <app-contracts-department-chart></app-contracts-department-chart>
  </div>

  <!-- Responsive Dashboard Additional Widgets Grid Block -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <app-contracts-expiry-alert></app-contracts-expiry-alert>
    <app-contract-value-summary></app-contract-value-summary>
    <app-obligations-milestones-chart></app-obligations-milestones-chart>
    
    <app-recent-activities></app-recent-activities>
    <app-review-turnaround-chart></app-review-turnaround-chart>
    <app-documents-category-chart></app-documents-category-chart>
  </div>
</div>
