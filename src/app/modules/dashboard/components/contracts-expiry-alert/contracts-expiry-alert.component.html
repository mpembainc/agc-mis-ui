<div class="flex flex-col h-full bg-white border border-slate-100 rounded-xl p-5 shadow-xs hover:shadow-md transition-all duration-300">
  <span class="text-xs font-bold text-slate-700 font-figtree tracking-wide uppercase mb-4">Contracts Expiry Alert</span>
  
  <div class="flex flex-col gap-4 flex-1">
    @for (item of items; track item.ref) {
      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <div [class]="'flex items-center justify-center size-10 rounded-lg shrink-0 ' + getSeverityClasses(item.severity).iconContainer">
            <svg lucideCalendarDays class="size-5"></svg>
          </div>
          <div class="flex flex-col">
            <span class="text-xs font-bold text-slate-800 leading-tight font-figtree">{{ item.title }}</span>
            <span class="text-[10px] font-semibold text-slate-400 font-figtree mt-0.5 leading-none">{{ item.ref }}</span>
          </div>
        </div>
        <div class="flex flex-col items-end text-right shrink-0">
          <span class="text-xs font-bold font-figtree leading-none" [class]="getSeverityClasses(item.severity).daysText">{{ item.days }}</span>
          <span class="text-[10px] font-medium text-slate-400 font-figtree mt-0.5 leading-none">{{ item.note }}</span>
        </div>
      </div>
    }
  </div>
  
  <!-- Divider -->
  <div class="my-4 h-px bg-slate-100"></div>

  <!-- Footer Link -->
  <div class="flex items-center justify-between">
    <a href="#" class="text-xs font-bold font-figtree text-[#0063D6] hover:underline flex items-center gap-1">
      View all expiring contracts
    </a>
    <svg lucideArrowRight class="size-4 text-[#0063D6]"></svg>
  </div>
</div>
