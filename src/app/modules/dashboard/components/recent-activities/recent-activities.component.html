<div class="flex flex-col h-full bg-white border border-slate-100 rounded-xl p-5 shadow-xs hover:shadow-md transition-all duration-300">
  <span class="text-xs font-bold text-slate-700 font-figtree tracking-wide uppercase mb-4">Recent Contract Activities</span>
  
  <div class="flex flex-col gap-4 flex-1">
    @for (activity of activities; track activity.subtitle) {
      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <div [class]="'flex items-center justify-center size-10 rounded-lg shrink-0 ' + getThemeClasses(activity.theme)">
            <svg [lucideIcon]="activity.icon" class="size-5"></svg>
          </div>
          <div class="flex flex-col">
            <span class="text-xs font-bold text-slate-800 leading-tight font-figtree">{{ activity.title }}</span>
            <span class="text-[10px] font-semibold text-slate-400 font-figtree mt-0.5 leading-none">{{ activity.subtitle }}</span>
          </div>
        </div>
        <div class="flex flex-col items-end text-right shrink-0">
          <span class="text-xs font-bold text-slate-500 font-figtree leading-none">{{ activity.time }}</span>
          <span class="text-[10px] font-medium text-slate-400 font-figtree mt-0.5 leading-none">{{ activity.actor }}</span>
        </div>
      </div>
    }
  </div>
  
  <!-- Divider -->
  <div class="my-4 h-px bg-slate-100"></div>

  <!-- Footer Link -->
  <div class="flex items-center justify-between">
    <a href="#" class="text-xs font-bold font-figtree text-[#0063D6] hover:underline flex items-center gap-1">
      View all activities
    </a>
    <svg lucideArrowRight class="size-4 text-[#0063D6]"></svg>
  </div>
</div>
