<div class="flex items-center gap-4 bg-white border border-slate-100 rounded-xl p-4 shadow-xs hover:shadow-md hover:-translate-y-0.5 transition-all duration-300 cursor-pointer">
  <div [class]="'flex items-center justify-center rounded-full shrink-0 size-10 ' + themeClasses.circle">
    <svg [lucideIcon]="icon" class="size-5"></svg>
  </div>
  <div class="flex flex-col">
    <span class="text-2xl font-extrabold text-slate-800 tracking-tight leading-none">{{ count }}</span>
    <span class="text-xs font-semibold text-slate-500 font-figtree mt-1.5 leading-none">{{ label }}</span>
    @if (linkRoute) {
      <a [routerLink]="linkRoute" class="text-xs font-bold font-figtree mt-2.5 leading-none transition-colors duration-200 no-underline hover:underline" [class]="themeClasses.link">
        {{ linkText }}
      </a>
    } @else {
      <span class="text-xs font-bold font-figtree mt-2.5 leading-none transition-colors duration-200 hover:underline cursor-pointer" [class]="themeClasses.link">
        {{ linkText }}
      </span>
    }
  </div>
</div>
