<div class="flex flex-col h-full bg-white border border-slate-100 rounded-xl p-5 shadow-xs hover:shadow-md transition-all duration-300">
  <span class="text-xs font-bold text-slate-700 font-figtree tracking-wide uppercase mb-4">Documents by Category</span>
  
  <div class="flex flex-row items-center gap-6 py-2 flex-1">
    <!-- Donut Canvas & Center text -->
    <div class="relative w-36 h-36 flex items-center justify-center shrink-0">
      <canvas #canvas></canvas>
      <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
        <span class="text-2xl font-extrabold text-slate-800 tracking-tight leading-none">312</span>
        <span class="text-[10px] font-bold text-slate-400 font-figtree tracking-wide uppercase mt-1 leading-none">Documents</span>
      </div>
    </div>
    
    <!-- Legend -->
    <div class="flex flex-col gap-2.5 flex-1 justify-center">
      @for (item of legendItems; track item.label) {
        <div class="flex items-center justify-between font-figtree text-xs">
          <div class="flex items-center gap-2">
            <span [class]="'size-2.5 rounded-full shrink-0 ' + item.dotClass"></span>
            <span class="text-slate-600 font-medium">{{ item.label }}</span>
          </div>
          <span class="text-slate-800 font-semibold">{{ item.value }} <span class="text-slate-400 font-normal">({{ item.percentage }}%)</span></span>
        </div>
      }
    </div>
  </div>
  
  <!-- Divider -->
  <div class="my-4 h-px bg-slate-100"></div>

  <!-- Footer Link -->
  <div class="flex items-center justify-between">
    <a href="#" class="text-xs font-bold font-figtree text-[#0063D6] hover:underline flex items-center gap-1">
      View documents repository
    </a>
    <svg lucideArrowRight class="size-4 text-[#0063D6]"></svg>
  </div>
</div>
