<div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs flex flex-col justify-between hover:shadow-md transition-all duration-300" [ngClass]="cardClass">
  <span class="text-slate-400 text-xs font-semibold uppercase tracking-wider">{{ label }}</span>
  <div class="flex justify-between items-end">
    <span class="text-2xl font-extrabold leading-none" [ngClass]="valueClass || 'text-slate-900'">{{ value }}</span>
    <div class="p-1.5 rounded-lg flex items-center justify-center shrink-0" [ngClass]="iconClass || 'bg-slate-100 text-slate-600'">
      <mat-icon class="text-[20px]! h-5! w-5!">{{ icon }}</mat-icon>
    </div>
  </div>
</div>
